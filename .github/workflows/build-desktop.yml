name: Build Desktop Apps

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Compile C# Capture Sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: frontend/src-tauri
        run: |
          mkdir -p bin
          C:\Windows\Microsoft.NET\Framework\v4.0.30319\csc.exe -out:bin\gv_capture.exe -target:winexe src\capture\gv_capture.cs

      - name: Build Desktop App
        working-directory: frontend
        run: npx tauri build ${{ matrix.args }}
        env:
          # Disable Apple code signing — use ad-hoc signing instead
          APPLE_SIGNING_IDENTITY: "-"

      - name: Ad-hoc sign & remove quarantine (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          APP_PATH=$(find frontend/src-tauri/target -path "*/release/bundle/macos/*.app" | head -n 1)
          # Ad-hoc sign the entire .app bundle
          codesign --force --deep --sign - "$APP_PATH"
          # Remove macOS quarantine attribute so users don't get "damaged" error
          xattr -cr "$APP_PATH"

      - name: Upload Mac Artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Mac-App.zip
          path: |
            frontend/src-tauri/target/**/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/**/release/bundle/macos/*.app

      - name: Upload Windows Artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Windows-App
          path: |
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe
